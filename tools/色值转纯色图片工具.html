<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色值转纯色图片生成器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            width: 400px;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 22px;
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
        }
        .color-pick-wrapper {
            display: flex;
            gap: 10px;
        }
        input[type="color"] {
            border: 1px solid #cbd5e1;
            background: none;
            padding: 0;
            width: 50px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
        }
        input[type="text"], input[type="number"] {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border-color: #3b82f6;
        }
        .resolution-group {
            display: flex;
            gap: 12px;
        }
        .resolution-group .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        .preview-box {
            margin: 24px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        /* 透明网格背景，方便预览含透明度的颜色（虽然纯色图通常不透明） */
        .preview-card {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%), 
                              linear-gradient(45deg, #eee 25%, white 25%, white 75%, #eee 75%);
            background-size: 16px 16px;
            background-position: 0 0, 8px 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #colorPreview {
            width: 100%;
            height: 100%;
            background-color: #000000;
            transition: background-color 0.1s;
        }
        .btn-download {
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-download:hover {
            background-color: #2563eb;
        }
        .hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>色值转纯色图片工具</h2>
    
    <div class="form-group">
        <label>选择颜色 / 输入 Hex</label>
        <div class="color-pick-wrapper">
            <input type="color" id="colorPicker" value="#000000">
            <input type="text" id="hexInput" value="#000000" placeholder="#ffffff 或 ffffff">
        </div>
    </div>

    <div class="form-group">
        <label>RGB 色值</label>
        <input type="text" id="rgbInput" value="rgb(0, 0, 0)" placeholder="例如: 255, 255, 255 或 rgb(0,0,0)">
    </div>

    <div class="resolution-group">
        <div class="form-group">
            <label>宽度 (px)</label>
            <input type="number" id="imgWidth" value="30" min="1" max="8192">
        </div>
        <div class="form-group">
            <label>高度 (px)</label>
            <input type="number" id="imgHeight" value="30" min="1" max="8192">
        </div>
    </div>

    <div class="preview-box">
        <label>实时预览</label>
        <div class="preview-card">
            <div id="colorPreview"></div>
        </div>
        <div class="hint" id="infoHint">30 × 30 px</div>
    </div>

    <button class="btn-download" id="downloadBtn">生成并下载 PNG</button>
</div>

<script>
    const colorPicker = document.getElementById('colorPicker');
    const hexInput = document.getElementById('hexInput');
    const rgbInput = document.getElementById('rgbInput');
    const imgWidth = document.getElementById('imgWidth');
    const imgHeight = document.getElementById('imgHeight');
    const colorPreview = document.getElementById('colorPreview');
    const infoHint = document.getElementById('infoHint');
    const downloadBtn = document.getElementById('downloadBtn');

    // 工具函数：Hex 转 RGB
    function hexToRgb(hex) {
        let c = hex.replace('#', '');
        if (c.length === 3) {
            c = c.split('').map(x => x + x).join('');
        }
        const num = parseInt(c, 16);
        return {
            r: (num >> 16) & 255,
            g: (num >> 8) & 255,
            b: num & 255
        };
    }

    // 工具函数：RGB 转 Hex
    function rgbToHex(r, g, b) {
        return "#" + [r, g, b].map(x => {
            const hex = parseInt(x).toString(16);
            return hex.length === 1 ? '0' + hex : hex;
        }).join('');
    }

    // 解析 RGB 字符串
    function parseRgbString(str) {
        const match = str.match(/\d+/g);
        if (match && match.length >= 3) {
            return { r: parseInt(match[0]), g: parseInt(match[1]), b: parseInt(match[2]) };
        }
        return null;
    }

    // 更新所有视图（同步颜色）
    function updateColors(currentHex, source) {
        // 确保带 #
        if (!currentHex.startsWith('#')) currentHex = '#' + currentHex;
        
        // 验证 hex 是否合法
        if (!/^#[0-9A-Fa-f]{6}$/.test(currentHex)) return;

        // 1. 更新预览区域背景色
        colorPreview.style.backgroundColor = currentHex;

        // 2. 根据来源同步其他输入框
        if (source !== 'picker') colorPicker.value = currentHex;
        if (source !== 'hex') hexInput.value = currentHex;
        
        if (source !== 'rgb') {
            const rgb = hexToRgb(currentHex);
            rgbInput.value = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
        }
        
        updateHint();
    }

    // 更新底部提示分辨率信息
    function updateHint() {
        const w = imgWidth.value || 30;
        const h = imgHeight.value || 30;
        infoHint.innerText = `${w} × ${h} px (${hexInput.value})`;
    }

    // --- 事件监听 ---

    // 1. 调色板选色
    colorPicker.addEventListener('input', (e) => {
        updateColors(e.target.value, 'picker');
    });

    // 2. Hex 输入框改变
    hexInput.addEventListener('input', (e) => {
        let val = e.target.value.trim();
        if (/^[0-9A-Fa-f]{6}$/.test(val)) {
            val = '#' + val;
        }
        updateColors(val, 'hex');
    });

    // 3. RGB 输入框改变
    rgbInput.addEventListener('input', (e) => {
        const rgb = parseRgbString(e.target.value);
        if (rgb && rgb.r <= 255 && rgb.g <= 255 && rgb.b <= 255) {
            const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
            updateColors(hex, 'rgb');
        }
    });

    // 4. 分辨率输入框改变
    imgWidth.addEventListener('input', updateHint);
    imgHeight.addEventListener('input', updateHint);

    // 5. 点击下载
    downloadBtn.addEventListener('click', () => {
        const width = parseInt(imgWidth.value) || 30;
        const height = parseInt(imgHeight.value) || 30;
        const color = colorPicker.value;

        // 创建离屏 Canvas 绘制图片
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');

        // 填充颜色
        ctx.fillStyle = color;
        ctx.fillRect(0, 0, width, height);

        // 导出并下载
        const dataUrl = canvas.toDataURL('image/png');
        const downloadLink = document.createElement('a');
        
        // 文件名格式：color_#000000_30x30.png
        downloadLink.download = `color_${color.replace('#', '')}_${width}x${height}.png`;
        downloadLink.href = dataUrl;
        downloadLink.click();
    });

    // 初始化提示
    updateHint();
</script>

</body>
</html>
